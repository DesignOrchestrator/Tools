<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DDIXP Lead Pipeline Tracker</title>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f8;
margin:20px;
}

h1{
margin-bottom:10px;
}

.toolbar{
margin-bottom:15px;
}

button{
padding:6px 12px;
margin-right:6px;
border:none;
background:#2d7ff9;
color:white;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1b5ed6;
}

button.danger{
background:#d9534f;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#f1f3f5;
}

input,select{
width:100%;
border:none;
outline:none;
background:transparent;
}

.delete-btn{
background:#ff5c5c;
border:none;
color:white;
padding:4px 8px;
border-radius:3px;
cursor:pointer;
}

.footer{
margin-top:15px;
color:#777;
font-size:13px;
}
</style>

</head>

<body>

<h1>DDIXP Lead Pipeline Tracker</h1>

<div class="toolbar">
<button onclick="addRow()">Add Lead</button>
<button onclick="exportData()">Export Backup</button>
<button onclick="importData()">Import Backup</button>
<button class="danger" onclick="clearData()">Clear All</button>
<input type="file" id="fileInput" style="display:none"/>
</div>

<table id="pipelineTable">
<thead>
<tr>
<th>Company</th>
<th>Contact Person</th>
<th>Country</th>
<th>Stage</th>
<th>Potential Value ($)</th>
<th>Last Action</th>
<th>Notes</th>
<th>Delete</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="footer">
Auto-saved locally in your browser. Always export backup regularly.
</div>

<script>

const STORAGE_KEY="leadPipelineData";

const stages=[
"Lead Identified",
"Contacted",
"Responded",
"Discovery",
"Proposal Sent",
"Negotiation",
"Won",
"Lost"
];

function createStageDropdown(value=""){
let select=document.createElement("select");

stages.forEach(stage=>{
let option=document.createElement("option");
option.value=stage;
option.text=stage;
if(stage===value) option.selected=true;
select.appendChild(option);
});

select.onchange=saveData;
return select;
}

function addRow(data={}){

let table=document.querySelector("#pipelineTable tbody");
let row=document.createElement("tr");

function cellInput(value=""){
let input=document.createElement("input");
input.value=value;
input.oninput=saveData;
return input;
}

let company=cellInput(data.company||"");
let contact=cellInput(data.contact||"");
let country=cellInput(data.country||"");
let stage=createStageDropdown(data.stage||"Lead Identified");
let value=cellInput(data.value||"");
let action=cellInput(data.action||"");
let notes=cellInput(data.notes||"");

let del=document.createElement("button");
del.innerText="X";
del.className="delete-btn";
del.onclick=function(){
row.remove();
saveData();
};

let cells=[company,contact,country,stage,value,action,notes];

cells.forEach(el=>{
let td=document.createElement("td");
td.appendChild(el);
row.appendChild(td);
});

let tdDel=document.createElement("td");
tdDel.appendChild(del);
row.appendChild(tdDel);

table.appendChild(row);

saveData();
}

function saveData(){

let rows=document.querySelectorAll("#pipelineTable tbody tr");

let data=[];

rows.forEach(row=>{

let cells=row.querySelectorAll("input,select");

data.push({
company:cells[0].value,
contact:cells[1].value,
country:cells[2].value,
stage:cells[3].value,
value:cells[4].value,
action:cells[5].value,
notes:cells[6].value
});

});

localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}

function loadData(){

let data=localStorage.getItem(STORAGE_KEY);

if(!data) return;

JSON.parse(data).forEach(d=>addRow(d));
}

function exportData(){

let data=localStorage.getItem(STORAGE_KEY) || "[]";

let blob=new Blob([data],{type:"application/json"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="lead_pipeline_backup.json";

link.click();
}

function importData(){

document.getElementById("fileInput").click();

document.getElementById("fileInput").onchange=function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(evt){

localStorage.setItem(STORAGE_KEY,evt.target.result);

location.reload();

};

reader.readAsText(file);
};
}

function clearData(){

if(!confirm("Clear all pipeline data?")) return;

localStorage.removeItem(STORAGE_KEY);

location.reload();
}

loadData();

</script>

</body>
</html>
