<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Model Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:"Segoe UI",Arial,sans-serif;
background:#f4f6fb;
margin:0;
padding:20px;
color:#1f2937;
}

.container{
max-width:1800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:10px;
font-size:28px;
}

/* COMPACT STICKY BANNER */

.banner{
position:sticky;
top:0;
z-index:999;
background:white;
padding:10px 12px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.08);
margin-bottom:15px;
}

/* HEADER GRID */

.header{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
margin-bottom:8px;
}

.field{
display:flex;
flex-direction:column;
font-size:12px;
font-weight:600;
color:#555;
}

.field textarea{
border:1px solid #d1d5db;
border-radius:6px;
padding:4px 6px;
font-size:13px;
resize:none;
overflow:hidden;
}

/* TOOLBAR */

.toolbar{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}

button{
padding:6px 14px;
border:none;
border-radius:6px;
background:#4f6df5;
color:white;
font-size:13px;
font-weight:600;
cursor:pointer;
}

/* CANVAS */

.canvas{
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:260px 260px 260px;
gap:16px;
}

/* BLOCK */

.block{
border-radius:14px;
padding:12px;
display:flex;
flex-direction:column;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
}

.block h3{
margin:0 0 6px 0;
font-size:15px;
}

/* DESCRIPTION AUTO FIT */

.desc{
border:none;
border-radius:8px;
padding:8px;
margin-bottom:6px;
font-size:13px;
background:rgba(255,255,255,0.6);
resize:none;
overflow:hidden;
}

/* NOTES */

.notes{
flex:1;
border:none;
border-radius:8px;
padding:8px;
font-size:14px;
resize:vertical;
background:rgba(255,255,255,0.85);
}

/* GRID POSITIONS */

.kp{grid-column:1;grid-row:1;background:#dbeafe;}
.ka{grid-column:1;grid-row:2;background:#cffafe;}
.kr{grid-column:1;grid-row:3;background:#dcfce7;}

.vp{
grid-column:2 / span 2;
grid-row:1 / span 2;
background:#fef3c7;
}

.cr{grid-column:4;grid-row:1;background:#fbcfe8;}
.ch{grid-column:5;grid-row:1;background:#e9d5ff;}

.cs{
grid-column:4 / span 2;
grid-row:2;
background:#bfdbfe;
}

.cost{
grid-column:2 / span 2;
grid-row:3;
background:#fed7aa;
}

.rev{
grid-column:4 / span 2;
grid-row:3;
background:#bbf7d0;
}

</style>
</head>

<body>

<div class="container">

<h1>Business Model Canvas</h1>

<div class="banner">

<div class="header">

<div class="field">
Project
<textarea id="project"></textarea>
</div>

<div class="field">
Company
<textarea id="company"></textarea>
</div>

<div class="field">
Founder
<textarea id="founder"></textarea>
</div>

<div class="field">
Date
<textarea id="date"></textarea>
</div>

<div class="field">
Version
<textarea id="version"></textarea>
</div>

</div>

<div class="toolbar">

<button onclick="saveData()">Save</button>
<button onclick="clearData()">Clear</button>
<button onclick="window.print()">Export PDF</button>
<button onclick="exportBackup()">Export Backup</button>
<button onclick="importBackup()">Import Backup</button>

<input type="file" id="fileInput" style="display:none" accept=".json">

</div>

</div>

<div class="canvas">

<div class="block kp">
<h3>Key Partners</h3>
<textarea class="desc" id="kp_desc"></textarea>
<textarea class="notes" id="kp"></textarea>
</div>

<div class="block ka">
<h3>Key Activities</h3>
<textarea class="desc" id="ka_desc"></textarea>
<textarea class="notes" id="ka"></textarea>
</div>

<div class="block kr">
<h3>Key Resources</h3>
<textarea class="desc" id="kr_desc"></textarea>
<textarea class="notes" id="kr"></textarea>
</div>

<div class="block vp">
<h3>Value Proposition</h3>
<textarea class="desc" id="vp_desc"></textarea>
<textarea class="notes" id="vp"></textarea>
</div>

<div class="block cr">
<h3>Customer Relationships</h3>
<textarea class="desc" id="cr_desc"></textarea>
<textarea class="notes" id="cr"></textarea>
</div>

<div class="block ch">
<h3>Channels</h3>
<textarea class="desc" id="ch_desc"></textarea>
<textarea class="notes" id="ch"></textarea>
</div>

<div class="block cs">
<h3>Customer Segments</h3>
<textarea class="desc" id="cs_desc"></textarea>
<textarea class="notes" id="cs"></textarea>
</div>

<div class="block cost">
<h3>Cost Structure</h3>
<textarea class="desc" id="cost_desc"></textarea>
<textarea class="notes" id="cost"></textarea>
</div>

<div class="block rev">
<h3>Revenue Streams</h3>
<textarea class="desc" id="rev_desc"></textarea>
<textarea class="notes" id="rev"></textarea>
</div>

</div>

</div>

<script>

const fields=[
"project","company","founder","date","version",
"kp_desc","kp","ka_desc","ka","kr_desc","kr",
"vp_desc","vp","cr_desc","cr","ch_desc","ch",
"cs_desc","cs","cost_desc","cost","rev_desc","rev"
]

/* AUTO RESIZE TEXTAREA */

function autoResize(el){
el.style.height="auto"
el.style.height=el.scrollHeight+"px"
}

document.addEventListener("input",function(e){
if(e.target.tagName==="TEXTAREA"){
autoResize(e.target)
}
})

function saveData(){
fields.forEach(id=>{
localStorage.setItem(id,document.getElementById(id).value)
})
alert("Saved")
}

function loadData(){
fields.forEach(id=>{
let el=document.getElementById(id)
el.value=localStorage.getItem(id)||""
autoResize(el)
})
}

function clearData(){
if(confirm("Clear all data?")){
localStorage.clear()
location.reload()
}
}

function exportBackup(){

let data={}
fields.forEach(id=>{
data[id]=document.getElementById(id).value
})

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})
let link=document.createElement("a")

link.href=URL.createObjectURL(blob)
link.download="bmc_backup.json"
link.click()

}

function importBackup(){
document.getElementById("fileInput").click()
}

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

fields.forEach(id=>{
let el=document.getElementById(id)
if(data[id]!==undefined){
el.value=data[id]
localStorage.setItem(id,data[id])
autoResize(el)
}
})

alert("Backup restored")

}

reader.readAsText(file)

})

window.onload=loadData

</script>

</body>
</html>
