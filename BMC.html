<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Model Canvas</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:"Segoe UI",Arial,sans-serif;
background:#f4f6fb;
margin:0;
padding:20px;
color:#1f2937;
}

.container{
max-width:1800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:15px;
font-size:32px;
font-weight:700;
}

/* STICKY BANNER */

.banner{
position:sticky;
top:0;
z-index:999;
background:#f4f6fb;
padding-bottom:10px;
}

/* HEADER */

.header{
background:white;
padding:16px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.06);
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:12px;
}

.header input{
padding:12px;
border:1px solid #d1d5db;
border-radius:8px;
font-size:15px;
}

/* TOOLBAR */

.toolbar{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:15px;
flex-wrap:wrap;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4f6df5;
color:white;
font-weight:600;
cursor:pointer;
}

/* CANVAS */

.canvas{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:16px;
}

/* BLOCK */

.block{
border-radius:14px;
padding:14px;
display:flex;
flex-direction:column;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
min-height:260px;
resize:both;
overflow:auto;
}

.block h3{
font-size:16px;
margin-bottom:6px;
font-weight:700;
}

/* DESCRIPTION */

.desc{
height:60px;
resize:vertical;
margin-bottom:8px;
border-radius:8px;
border:none;
padding:8px;
font-size:14px;
background:rgba(255,255,255,0.6);
}

/* MAIN NOTES */

.notes{
flex:1;
resize:both;
border:none;
border-radius:10px;
padding:10px;
font-size:15px;
line-height:1.6;
background:rgba(255,255,255,0.8);
}

/* COLORS */

.kp{grid-column:1;background:#dbeafe;}
.ka{grid-column:1;background:#cffafe;}
.kr{grid-column:1;background:#dcfce7;}

.vp{
grid-column:2 / span 2;
background:#fef3c7;
}

.cr{grid-column:4;background:#fbcfe8;}
.ch{grid-column:5;background:#e9d5ff;}

.cs{
grid-column:4 / span 2;
background:#bfdbfe;
}

.cost{
grid-column:2 / span 2;
background:#fed7aa;
}

.rev{
grid-column:4 / span 2;
background:#bbf7d0;
}

/* MOBILE */

@media(max-width:900px){

.header{
grid-template-columns:1fr 1fr;
}

.canvas{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Business Model Canvas</h1>

<div class="banner">

<div class="header">
<input id="project" placeholder="Project Name">
<input id="company" placeholder="Company">
<input id="founder" placeholder="Founder">
<input id="date" placeholder="Date">
<input id="version" placeholder="Version">
</div>

<div class="toolbar">
<button onclick="saveData()">Save</button>
<button onclick="clearData()">Clear</button>
<button onclick="window.print()">Export PDF</button>
<button onclick="exportBackup()">Export Backup</button>
<button onclick="importBackup()">Import Backup</button>
<input type="file" id="fileInput" style="display:none" accept=".json">
</div>

</div>

<div class="canvas">

<div class="block kp">
<h3>Key Partners</h3>
<textarea class="desc" id="kp_desc" placeholder="Short description..."></textarea>
<textarea class="notes" id="kp" placeholder="Detailed notes..."></textarea>
</div>

<div class="block ka">
<h3>Key Activities</h3>
<textarea class="desc" id="ka_desc"></textarea>
<textarea class="notes" id="ka"></textarea>
</div>

<div class="block kr">
<h3>Key Resources</h3>
<textarea class="desc" id="kr_desc"></textarea>
<textarea class="notes" id="kr"></textarea>
</div>

<div class="block vp">
<h3>Value Proposition</h3>
<textarea class="desc" id="vp_desc"></textarea>
<textarea class="notes" id="vp"></textarea>
</div>

<div class="block cr">
<h3>Customer Relationships</h3>
<textarea class="desc" id="cr_desc"></textarea>
<textarea class="notes" id="cr"></textarea>
</div>

<div class="block ch">
<h3>Channels</h3>
<textarea class="desc" id="ch_desc"></textarea>
<textarea class="notes" id="ch"></textarea>
</div>

<div class="block cs">
<h3>Customer Segments</h3>
<textarea class="desc" id="cs_desc"></textarea>
<textarea class="notes" id="cs"></textarea>
</div>

<div class="block cost">
<h3>Cost Structure</h3>
<textarea class="desc" id="cost_desc"></textarea>
<textarea class="notes" id="cost"></textarea>
</div>

<div class="block rev">
<h3>Revenue Streams</h3>
<textarea class="desc" id="rev_desc"></textarea>
<textarea class="notes" id="rev"></textarea>
</div>

</div>

</div>

<script>

const fields=[
"project","company","founder","date","version",

"kp_desc","kp",
"ka_desc","ka",
"kr_desc","kr",
"vp_desc","vp",
"cr_desc","cr",
"ch_desc","ch",
"cs_desc","cs",
"cost_desc","cost",
"rev_desc","rev"

]

function saveData(){

fields.forEach(id=>{
localStorage.setItem(id,document.getElementById(id).value)
})

alert("Saved Successfully")

}

function loadData(){

fields.forEach(id=>{
document.getElementById(id).value=localStorage.getItem(id)||""
})

}

function clearData(){

if(confirm("Clear all data?")){
localStorage.clear()
location.reload()
}

}

function exportBackup(){

let data={}

fields.forEach(id=>{
data[id]=document.getElementById(id).value
})

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

let link=document.createElement("a")
link.href=URL.createObjectURL(blob)
link.download="business_model_canvas_backup.json"
link.click()

}

function importBackup(){
document.getElementById("fileInput").click()
}

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

fields.forEach(id=>{
if(data[id]!==undefined){
document.getElementById(id).value=data[id]
localStorage.setItem(id,data[id])
}
})

alert("Backup Restored Successfully")

}

reader.readAsText(file)

})

window.onload=loadData

</script>

</body>
</html>
