<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Business Model Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:"Segoe UI",Arial,sans-serif;
background:#f1f5f9;
margin:0;
padding:20px;
color:#1f2937;
}

.container{
max-width:1800px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:12px;
font-size:28px;
}

/* ---------- BANNER ---------- */

.banner{
position:sticky;
top:0;
z-index:999;
background:linear-gradient(90deg,#eef2ff,#f8fafc);
padding:12px;
border-radius:12px;
box-shadow:0 4px 14px rgba(0,0,0,0.08);
margin-bottom:15px;
}

/* header grid */

.header{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:12px;
margin-bottom:8px;
}

/* field */

.field{
display:flex;
flex-direction:column;
font-size:12px;
font-weight:600;
color:#374151;
}

.field textarea,
.field input,
.field select{

height:32px;
border:1px solid #d1d5db;
border-radius:8px;
padding:4px 8px;
font-size:13px;
background:white;

}

.field textarea{
resize:none;
}

/* canvas selector highlight */

#canvasSelect{
background:#eef2ff;
border:1px solid #6366f1;
}

/* toolbar */

.toolbar{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
margin-top:5px;
}

button{
padding:6px 12px;
border:none;
border-radius:8px;
background:#4f6df5;
color:white;
font-size:13px;
font-weight:600;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#3b53c7;
}

/* ---------- CANVAS GRID ---------- */

.canvas{
display:grid;
grid-template-columns:repeat(5,1fr);
grid-template-rows:260px 260px 260px;
gap:16px;
}

/* card */

.block{
border-radius:14px;
padding:12px;
display:flex;
flex-direction:column;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.block h3{
margin:0 0 6px;
font-size:15px;
}

/* description */

.desc{
border:none;
border-radius:8px;
padding:8px;
margin-bottom:6px;
font-size:13px;
background:rgba(255,255,255,0.6);
resize:none;
}

/* notes */

.notes{
flex:1;
border:none;
border-radius:8px;
padding:8px;
font-size:14px;
background:rgba(255,255,255,0.85);
}

/* layout colors */

.kp{grid-column:1;grid-row:1;background:#dbeafe;}
.ka{grid-column:1;grid-row:2;background:#cffafe;}
.kr{grid-column:1;grid-row:3;background:#dcfce7;}

.vp{grid-column:2/span 2;grid-row:1/span 2;background:#fef3c7;}

.cr{grid-column:4;grid-row:1;background:#fbcfe8;}
.ch{grid-column:5;grid-row:1;background:#e9d5ff;}

.cs{grid-column:4/span 2;grid-row:2;background:#bfdbfe;}

.cost{grid-column:2/span 2;grid-row:3;background:#fed7aa;}
.rev{grid-column:4/span 2;grid-row:3;background:#bbf7d0;}

</style>
</head>

<body>

<div class="container">

<h1>Business Model Canvas</h1>

<div class="banner">

<div class="header">

<div class="field">
Canvas
<select id="canvasSelect"></select>
<div style="margin-top:4px">
<button onclick="addCanvas()">Add</button>
<button onclick="renameCanvas()">Rename</button>
<button onclick="deleteCanvas()">Delete</button>
</div>
</div>

<div class="field">
Company
<textarea id="company"></textarea>
</div>

<div class="field">
Founder
<textarea id="founder"></textarea>
</div>

<div class="field">
Date
<input type="date" id="date">
</div>

<div class="field">
Version
<textarea id="version"></textarea>
</div>

</div>

<div class="toolbar">

<button onclick="saveData()">Save</button>
<button onclick="clearData()">Clear</button>
<button onclick="window.print()">Export PDF</button>

<button onclick="exportCanvas()">Export Canvas</button>
<button onclick="importCanvas()">Import Canvas</button>

<button onclick="exportBackup()">Export Backup</button>
<button onclick="importBackup()">Import Backup</button>

<input type="file" id="fileInput" style="display:none">

</div>

</div>

<div class="canvas">

<div class="block kp"><h3>Key Partners</h3><textarea class="desc" id="kp_desc"></textarea><textarea class="notes" id="kp"></textarea></div>

<div class="block ka"><h3>Key Activities</h3><textarea class="desc" id="ka_desc"></textarea><textarea class="notes" id="ka"></textarea></div>

<div class="block kr"><h3>Key Resources</h3><textarea class="desc" id="kr_desc"></textarea><textarea class="notes" id="kr"></textarea></div>

<div class="block vp"><h3>Value Proposition</h3><textarea class="desc" id="vp_desc"></textarea><textarea class="notes" id="vp"></textarea></div>

<div class="block cr"><h3>Customer Relationships</h3><textarea class="desc" id="cr_desc"></textarea><textarea class="notes" id="cr"></textarea></div>

<div class="block ch"><h3>Channels</h3><textarea class="desc" id="ch_desc"></textarea><textarea class="notes" id="ch"></textarea></div>

<div class="block cs"><h3>Customer Segments</h3><textarea class="desc" id="cs_desc"></textarea><textarea class="notes" id="cs"></textarea></div>

<div class="block cost"><h3>Cost Structure</h3><textarea class="desc" id="cost_desc"></textarea><textarea class="notes" id="cost"></textarea></div>

<div class="block rev"><h3>Revenue Streams</h3><textarea class="desc" id="rev_desc"></textarea><textarea class="notes" id="rev"></textarea></div>

</div>

</div>

<script>

const fields=[
"company","founder","date","version",
"kp_desc","kp","ka_desc","ka","kr_desc","kr",
"vp_desc","vp","cr_desc","cr","ch_desc","ch",
"cs_desc","cs","cost_desc","cost","rev_desc","rev"
]

let canvases=JSON.parse(localStorage.getItem("canvases")) || {"Unassigned":{}}

/* restore last canvas */

let currentCanvas=localStorage.getItem("activeCanvas") || "Unassigned"

/* ---------- Migration ---------- */

function migrateOldData(){

if(localStorage.getItem("migration_done")) return

let oldData={}
let found=false

fields.forEach(id=>{
let v=localStorage.getItem(id)
if(v){
oldData[id]=v
found=true
}
})

if(found){

if(!canvases["Unassigned"]){
canvases["Unassigned"]={}
}

Object.assign(canvases["Unassigned"],oldData)

}

localStorage.setItem("migration_done","true")

}

/* ---------- Canvas ---------- */

function loadCanvasList(){

let select=document.getElementById("canvasSelect")
select.innerHTML=""

Object.keys(canvases).forEach(name=>{

let opt=document.createElement("option")
opt.value=name
opt.textContent=name

select.appendChild(opt)

})

if(!canvases[currentCanvas]){
currentCanvas="Unassigned"
}

select.value=currentCanvas

}

function loadCanvas(){

let data=canvases[currentCanvas] || {}

fields.forEach(id=>{
document.getElementById(id).value=data[id]||""
})

}

document.getElementById("canvasSelect").addEventListener("change",function(){

currentCanvas=this.value

localStorage.setItem("activeCanvas",currentCanvas)

loadCanvas()

})

function addCanvas(){

let name=prompt("Canvas name")

if(!name) return

if(canvases[name]){
alert("Canvas exists")
return
}

canvases[name]={}

currentCanvas=name

saveStorage()

refresh()

}

function renameCanvas(){

let name=prompt("New name",currentCanvas)

if(!name) return

canvases[name]=canvases[currentCanvas]

delete canvases[currentCanvas]

currentCanvas=name

saveStorage()

refresh()

}

function deleteCanvas(){

if(!confirm("Delete canvas?")) return

delete canvases[currentCanvas]

currentCanvas="Unassigned"

saveStorage()

refresh()

}

/* ---------- Data ---------- */

function saveData(){

let data={}

fields.forEach(id=>{
data[id]=document.getElementById(id).value
})

canvases[currentCanvas]=data

saveStorage()

alert("Saved")

}

function clearData(){

fields.forEach(id=>{
document.getElementById(id).value=""
})

}

/* ---------- Storage ---------- */

function saveStorage(){

localStorage.setItem("canvases",JSON.stringify(canvases))

localStorage.setItem("activeCanvas",currentCanvas)

}

/* ---------- Import Export ---------- */

function exportCanvas(){

let data={
canvasName:currentCanvas,
data:canvases[currentCanvas]
}

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download=currentCanvas+"_canvas.json"

link.click()

}

function importCanvas(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]

let reader=new FileReader()

reader.onload=function(e){

let data=JSON.parse(e.target.result)

let name=data.canvasName || "Imported"

canvases[name]=data.data

currentCanvas=name

saveStorage()

refresh()

}

reader.readAsText(file)

})

function exportBackup(){

let blob=new Blob([JSON.stringify(canvases,null,2)],{type:"application/json"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="bmc_backup.json"

link.click()

}

function importBackup(){
document.getElementById("fileInput").click()
}

/* ---------- Init ---------- */

function refresh(){

loadCanvasList()

loadCanvas()

}

migrateOldData()

refresh()

</script>

</body>
</html>
