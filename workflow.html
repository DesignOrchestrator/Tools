<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Workflow Template</title>

<style>

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto;
background:#eef2f6;
margin:0;
}

/* HEADER */

.topbar{
position:sticky;
top:0;
background:white;
padding:10px 18px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
}

h1{
margin:0;
font-size:18px;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:8px;
align-items:center;
}

button{
padding:5px 10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

.primary{background:#2c7be5;color:white;}
.success{background:#28a745;color:white;}
.secondary{background:#6c757d;color:white;}
.danger{background:#e55353;color:white;}

select{
padding:5px;
border-radius:6px;
}

.infobar{
margin-top:6px;
font-size:12px;
color:#555;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* STAGE BOX */

.stage-box{
background:white;
border-radius:8px;
margin-top:14px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
overflow:hidden;
}

.stage-header{
background:linear-gradient(90deg,#2c7be5,#4e8df5);
color:white;
padding:8px 12px;
font-size:13px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
}

.stage-header button{
background:white;
color:#2c7be5;
font-weight:bold;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

thead{
background:#f6f8fb;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

input{
width:100%;
border:none;
background:transparent;
font-size:13px;
}

input:focus{
background:#fff8dc;
outline:none;
}

.col-step{width:70px}
.col-ref{width:220px}
.col-delete{width:50px}

.delete-btn{
background:#e55353;
color:white;
border:none;
padding:4px 6px;
border-radius:4px;
cursor:pointer;
font-size:11px;
}

</style>
</head>

<body>

<div class="topbar">

<h1>Workflow Template</h1>

<div class="toolbar">

<select id="workflowSelect" onchange="changeWorkflow()"></select>

<button class="success" onclick="addWorkflow()">Add Workflow</button>

<button class="secondary" onclick="exportBackup()">Export Backup</button>
<button class="secondary" onclick="importBackup()">Import Backup</button>

<button class="danger" onclick="clearData()">Clear Data</button>

<input type="file" id="fileInput" style="display:none">

</div>

<div class="infobar">
Stages: <span id="stageCount">0</span> |
Steps: <span id="stepCount">0</span>
</div>

</div>

<div class="container">

<div id="workflow"></div>

</div>

<script>

const STORAGE_KEY="workflow_template_data"

let data=[]
let currentWorkflow=null

function load(){

let saved=localStorage.getItem(STORAGE_KEY)

if(saved){
data=JSON.parse(saved)
}

initWorkflow()

}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data))
}

/* WORKFLOW LIST */

function getWorkflows(){

let list=[...new Set(data.map(r=>r.workflow).filter(Boolean))]

if(list.length===0){
list=["Workflow 1"]
}

return list

}

function initWorkflow(){

let workflows=getWorkflows()

let select=document.getElementById("workflowSelect")

select.innerHTML=""

workflows.forEach(w=>{

let opt=document.createElement("option")
opt.value=w
opt.textContent=w
select.appendChild(opt)

})

currentWorkflow=workflows[0]

render()

}

function changeWorkflow(){

currentWorkflow=document.getElementById("workflowSelect").value

render()

}

/* GROUP STAGES */

function groupStages(rows){

let groups={}

rows.forEach(row=>{

let stage=row.stage||"Unassigned"

if(!groups[stage]) groups[stage]=[]

groups[stage].push(row)

})

return groups

}

/* RENDER */

function render(){

let container=document.getElementById("workflow")
container.innerHTML=""

let rows=data.filter(r=>r.workflow===currentWorkflow)

let groups=groupStages(rows)
let stages=Object.keys(groups)

document.getElementById("stageCount").innerText=stages.length
document.getElementById("stepCount").innerText=rows.length

stages.forEach((stage,stageIndex)=>{

let stageRows=groups[stage]

let stageBox=document.createElement("div")
stageBox.className="stage-box"

let header=document.createElement("div")
header.className="stage-header"

header.innerHTML=`
<span>${stageIndex+1}. ${stage}</span>
<button onclick="addRow('${stage}')">+</button>
`

let body=document.createElement("div")

let table=document.createElement("table")

table.innerHTML=`

<thead>
<tr>
<th class="col-step">Step</th>
<th>Action</th>
<th class="col-ref">Reference</th>
<th class="col-delete"></th>
</tr>
</thead>

<tbody></tbody>

`

let tbody=table.querySelector("tbody")

stageRows.forEach((row,rowIndex)=>{

let index=data.indexOf(row)

let step=`${stageIndex+1}.${rowIndex+1}`

let tr=document.createElement("tr")

tr.innerHTML=`

<td>${step}</td>

<td>
<input value="${row.action||""}" onchange="update(${index},'action',this.value)">
</td>

<td>
<input value="${row.ref||""}" placeholder="link / template"
onchange="update(${index},'ref',this.value)">
</td>

<td>
<button class="delete-btn" onclick="deleteRow(${index})">✕</button>
</td>

`

tbody.appendChild(tr)

})

body.appendChild(table)

stageBox.appendChild(header)
stageBox.appendChild(body)

container.appendChild(stageBox)

/* COLLAPSE */

header.onclick=(e)=>{
if(e.target.tagName!=="BUTTON"){
body.style.display=body.style.display==="none"?"block":"none"
}
}

})

}

/* ADD WORKFLOW */

function addWorkflow(){

let name=prompt("Workflow name")

if(!name) return

data.push({
workflow:name,
stage:"Stage 1",
action:"",
ref:""
})

save()
initWorkflow()

}

/* ADD ROW */

function addRow(stage){

data.push({
workflow:currentWorkflow,
stage:stage,
action:"",
ref:""
})

save()
render()

}

/* UPDATE */

function update(i,key,val){

data[i][key]=val
save()

}

/* DELETE */

function deleteRow(i){

data.splice(i,1)
save()
render()

}

/* EXPORT */

function exportBackup(){

let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="workflow-template-backup.json"
a.click()

}

/* IMPORT */

function importBackup(){

let file=document.getElementById("fileInput")

file.onchange=e=>{

let reader=new FileReader()

reader.onload=function(){

data=JSON.parse(reader.result)

save()
initWorkflow()

}

reader.readAsText(e.target.files[0])

}

file.click()

}

/* CLEAR */

function clearData(){

if(confirm("Clear all workflow steps?")){

data=[]
save()
initWorkflow()

}

}

load()

</script>

</body>
</html>
