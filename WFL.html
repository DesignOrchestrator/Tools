<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>Workflow Template</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:#eef2f6;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
font-size:28px;
}

.toolbar{
margin-bottom:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:9px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

button.primary{
background:#2c7be5;
color:white;
}

button.secondary{
background:#6c757d;
color:white;
}

button.danger{
background:#e55353;
color:white;
}

button:hover{
opacity:0.9;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}

thead{
background:#f5f7fa;
position:sticky;
top:0;
}

th{
text-align:left;
padding:14px;
font-size:14px;
color:#555;
border-bottom:1px solid #e6e9ef;
}

td{
padding:10px 12px;
border-bottom:1px solid #f0f2f5;
}

tbody tr:nth-child(even){
background:#fafbfc;
}

tbody tr:hover{
background:#f1f6ff;
}

input{
width:100%;
border:none;
background:transparent;
font-size:14px;
padding:4px;
}

input:focus{
outline:none;
background:#fff8dc;
border-radius:4px;
}

.delete-btn{
background:#e55353;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.delete-btn:hover{
background:#d13c3c;
}

.stage-col{
width:180px;
}

.step-col{
width:100px;
}

.action-col{
width:auto;
}

.delete-col{
width:60px;
text-align:center;
}

</style>

</head>


<body>

<div class="container">

<h1>Workflow Template</h1>

<div class="toolbar">

<button class="primary" onclick="addRow()">Add Row</button>

<button class="secondary" onclick="exportBackup()">Export Backup</button>

<button class="secondary" onclick="importBackup()">Import Backup</button>

<button class="secondary" onclick="importTemplate()">Import Template</button>

<button class="danger" onclick="clearData()">Clear Data</button>

<input type="file" id="fileInput" style="display:none">

</div>


<table id="table">

<thead>

<tr>
<th class="stage-col">Stage</th>
<th class="step-col">Step</th>
<th class="action-col">Action</th>
<th class="delete-col"></th>
</tr>

</thead>

<tbody></tbody>

</table>

</div>



<script>

const STORAGE_KEY="workflow_template_data";

let data=[];


/* LOAD */

function load(){

let saved=localStorage.getItem(STORAGE_KEY);

if(saved){
data=JSON.parse(saved);
}

render();

}


/* SAVE */

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}


/* RENDER */

function render(){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

data.forEach((row,i)=>{

let tr=document.createElement("tr");

tr.innerHTML=`

<td><input value="${row.stage}" onchange="update(${i},'stage',this.value)"></td>

<td><input value="${row.step}" onchange="update(${i},'step',this.value)"></td>

<td><input value="${row.action}" onchange="update(${i},'action',this.value)"></td>

<td style="text-align:center">
<button class="delete-btn" onclick="deleteRow(${i})">✕</button>
</td>

`;

tbody.appendChild(tr);

});

}


/* ADD ROW */

function addRow(){

data.push({
stage:"",
step:"",
action:""
});

save();
render();

}


/* DELETE ROW */

function deleteRow(i){

data.splice(i,1);

save();
render();

}


/* UPDATE */

function update(i,key,value){

data[i][key]=value;

save();

}


/* EXPORT BACKUP */

function exportBackup(){

let blob=new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="workflow-backup.json";

a.click();

}


/* IMPORT BACKUP */

function importBackup(){

let fileInput=document.getElementById("fileInput");

fileInput.onchange=function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

data=JSON.parse(reader.result);

save();
render();

};

reader.readAsText(file);

};

fileInput.click();

}


/* IMPORT TEMPLATE */

function importTemplate(){

let fileInput=document.getElementById("fileInput");

fileInput.onchange=function(e){

let file=e.target.files[0];

let reader=new FileReader();

reader.onload=function(){

data=JSON.parse(reader.result);

save();
render();

};

reader.readAsText(file);

};

fileInput.click();

}


/* CLEAR */

function clearData(){

if(confirm("Clear all data?")){

data=[];
save();
render();

}

}


load();

</script>


</body>
</html>
