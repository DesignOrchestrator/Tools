<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Workflow Template</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#eef2f6;
margin:0;
padding:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 8px 30px rgba(0,0,0,0.08);
}

h1{
margin-top:0;
}

.toolbar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:20px;
}

button{
padding:9px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:500;
}

.primary{background:#2c7be5;color:white;}
.secondary{background:#6c757d;color:white;}
.success{background:#28a745;color:white;}
.danger{background:#e55353;color:white;}

.stage-box{
border:1px solid #e5e7eb;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

.stage-header{
background:#f6f8fb;
padding:12px 16px;
font-weight:600;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.stage-body{
padding:10px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #eee;
vertical-align:top;
}

tbody tr:hover{
background:#f4f8ff;
}

input{
width:100%;
border:none;
background:transparent;
padding:4px;
font-size:14px;
white-space:normal;
word-wrap:break-word;
}

input:focus{
outline:none;
background:#fff8dc;
}

.delete-btn{
background:#e55353;
color:white;
border:none;
padding:5px 10px;
border-radius:5px;
cursor:pointer;
}

.drag{
cursor:grab;
color:#888;
font-size:16px;
}

</style>
</head>


<body>

<div class="container">

<h1>Workflow Template</h1>

<div class="toolbar">

<button class="primary" onclick="addRow()">Add Row</button>

<button class="success" onclick="sortByStep()">Auto Sort by Step</button>

<button class="secondary" onclick="exportBackup()">Export Backup</button>

<button class="secondary" onclick="importBackup()">Import Backup</button>

<button class="secondary" onclick="importTemplate()">Import Template</button>

<button class="danger" onclick="clearData()">Clear Data</button>

<input type="file" id="fileInput" style="display:none">

</div>

<div id="workflow"></div>

</div>


<script>

const STORAGE_KEY="workflow_template_data";
let data=[];


/* LOAD */

function load(){

let saved=localStorage.getItem(STORAGE_KEY);

if(saved){
data=JSON.parse(saved);
}

render();

}


/* SAVE */

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
}


/* GROUP BY STAGE */

function groupStages(){

let groups={};

data.forEach(row=>{
if(!groups[row.stage]) groups[row.stage]=[];
groups[row.stage].push(row);
});

return groups;

}


/* RENDER */

function render(){

let container=document.getElementById("workflow");
container.innerHTML="";

let groups=groupStages();

Object.keys(groups).forEach(stage=>{

let stageBox=document.createElement("div");
stageBox.className="stage-box";

let header=document.createElement("div");
header.className="stage-header";
header.innerHTML=`${stage || "Unassigned"} <span>▼</span>`;

let body=document.createElement("div");
body.className="stage-body";

let table=document.createElement("table");

table.innerHTML=`

<thead>
<tr>
<th style="width:40px"></th>
<th style="width:120px">Step</th>
<th>Action</th>
<th style="width:60px"></th>
</tr>
</thead>

<tbody></tbody>

`;

let tbody=table.querySelector("tbody");

groups[stage].forEach(row=>{

let index=data.indexOf(row);

let tr=document.createElement("tr");
tr.dataset.index=index;

tr.innerHTML=`

<td class="drag">☰</td>

<td>
<input value="${row.step}" onchange="update(${index},'step',this.value)">
</td>

<td>
<input value="${row.action}" onchange="update(${index},'action',this.value)">
</td>

<td>
<button class="delete-btn" onclick="deleteRow(${index})">✕</button>
</td>

`;

tbody.appendChild(tr);

});

body.appendChild(table);
stageBox.appendChild(header);
stageBox.appendChild(body);
container.appendChild(stageBox);


/* COLLAPSE */

header.onclick=()=>{
body.style.display=body.style.display==="none"?"block":"none";
};


/* DRAG SORT */

new Sortable(tbody,{
animation:150,
handle:".drag",
onEnd:function(){

let rows=[...tbody.querySelectorAll("tr")];

let reordered=[];

rows.forEach(r=>{
let i=r.dataset.index;
reordered.push(data[i]);
});

let others=data.filter(d=>d.stage!==stage);

data=[...others,...reordered];

save();
render();

}
});

});

}


/* ADD ROW */

function addRow(){

data.push({
stage:"",
step:"",
action:""
});

save();
render();

}


/* DELETE */

function deleteRow(i){

data.splice(i,1);

save();
render();

}


/* UPDATE */

function update(i,key,val){

data[i][key]=val;

save();

}


/* AUTO SORT */

function sortByStep(){

data.sort((a,b)=>{

return parseFloat(a.step) - parseFloat(b.step);

});

save();
render();

}


/* EXPORT */

function exportBackup(){

let blob=new Blob(
[JSON.stringify(data,null,2)],
{type:"application/json"}
);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="workflow-backup.json";

a.click();

}


/* IMPORT */

function importBackup(){

let file=document.getElementById("fileInput");

file.onchange=e=>{

let reader=new FileReader();

reader.onload=function(){

data=JSON.parse(reader.result);

save();
render();

};

reader.readAsText(e.target.files[0]);

};

file.click();

}


/* TEMPLATE IMPORT */

function importTemplate(){
importBackup();
}


/* CLEAR */

function clearData(){

if(confirm("Clear all data?")){

data=[];
save();
render();

}

}


load();

</script>

</body>
</html>
